description: |
inSileco is a company that specializes in data science and reproducibility. The company's mission is to help researchers and organizations make their data science workflows more efficient, transparent, and reproducible. 

We offer consulting and training services to help organizations implement reproducible data science practices. This includes helping organizations develop best practices, processes, and tools for data management, analysis, visualization and reproducible reporting, and providing training on reproducibility tools and techniques. 

In addition to its focus on reproducibility, we work on developing advanced data science solutions. The company's team of data scientists works on developing custom algorithms and models, as well as providing data science consulting services to help organizations optimize their data-driven decision-making. 

Our team has extensive experience working in academia, government and industry, on a wide diversity of projects ranging from environmental assessments and spatial planning in marine and terrestrial ecosystems, building data infrastructure and data science solutions in the medical fields, and building web-based interactive applications for organizations. We also remain active in environmental management research through strong ties with academic collaborators. 

Visit our [workshops]() and [consulting]() pages for the list of training and consulting services we offer, or [reach out](mailto:info@insileco.io) to us directly to discuss your needs. 

Visit our [projects]() and [achievements]() pages for a comprehensive list of the projects we have completed, been a part of, or are actively working on. 
