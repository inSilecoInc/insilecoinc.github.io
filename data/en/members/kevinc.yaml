bio: "Kevin Cazelles is a founder of inSileco. He holds a PhD in quantative ecology and is now a data scientist/engineer advocating for open and reproducible research. For almost ten years now, he has tackled research challenges in various areas of ecology. He has mainly focused on theory in macro-ecology and network ecology, but he also worked on various topics such as epidemics, forest dynamics, meta-ecosystems and food security. He has faced a wide array of technical problems and has acquired a very broad set of quantitative and computational skills."
