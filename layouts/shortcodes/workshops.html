
<div class="content">
  <div class="columns">
    {{ $data := index .Site.Data .Site.Language.Lang }}
    {{ range $data.workshops }}
      <div class="column is-one-third">
        <img src="{{ .picture }}" style="width:75%">
        <p>
          <h3>{{ .name }}</h3>
        </p>
        {{ .description }}
      </div>
    {{ end }}
  </div>
</div>
